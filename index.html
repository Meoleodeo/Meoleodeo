<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>Profile</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0c3951;
            color: #352424;
        }
        
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #1a5276;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-in-out;
        }
        
        .profile-info {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .profile-info img {
            width: 250px;
            border-radius: 50%;
            margin-bottom: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        
        .profile-info h1 {
            margin: 5px 0;
        }
        
        .profile-info p {
            opacity: 0.9;
            color: #000000;
        
        }
        
        .social-links {
            margin-top: 20px;
        }
        
        a {
            color: #000000;
            display: inline-block;
            margin-right: 10px;
            transition: color 0.3s ease;
        }
        
        a:hover {
            color: #00ff55;
        }
        
        .overview {
            margin-top: 20px;
        }
        
        .footer {
            position: fixed;
            bottom: 0;
            right: 0;
            background-color: #1a5276;
            color: #000000;
            padding: 10px 20px;
            border-top-left-radius: 8px;
        }
        
        .footer p {
            color: #000000;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="profile-info">
            <img src="https://avatars.githubusercontent.com/u/84314573?s=400&u=e52d04b7c1c9406562badf9f837bac56514f1a1a&v=4"
                alt="Profile Picture">
            <h1 align="center">
                <img
                    src="https://readme-typing-svg.herokuapp.com/?font=Righteous&size=35&center=true&vCenter=true&width=500&height=70&duration=4000&lines=Hi+There!+👋;+I'm+Thiện!;" />
            </h1>
            <p><i class="fab fa-github"></i> <strong>GitHub:</strong> <a
                    href="https://github.com/meoleodeo">meoleodeo</a></p>
            <p><i class="fas fa-envelope"></i> <strong>Email:</strong> <a
                    href="mailto:hnt.vn.vn@gmail.com">hnt.vn.vn@gmail.com</a></p>
        </div>
        <div class="social-links">
            <h2>Social Links</h2>
            <a href="https://www.facebook.com/Meo.leo.deo"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://www.linkedin.com/in/meoleodeo/"><i class="fab fa-linkedin"></i> LinkedIn</a>
            <a href="https://www.instagram.com/meo.leo.deo"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://www.youtube.com/@meoleodeo"><i class="fab fa-youtube"></i> Youtube</a>
        </div>
        <div class="other-links">
            <h2>Other Links</h2>
            <a href="https://meoleodeo.itch.io/">
                <i class="fab fa-itch-io"></i> itch.io
            </a>
        </div>
        <div class="overview">
            <h2>Overview</h2>
            <!-- <p>Provide an overview of your interests, skills, or anything else you'd like to share.</p> -->
        </div>
        <!-- <div class="profile-repos">
            <h2>Repositories</h2>
            <ul>
                <li><a href="https://github.com/your-username/repo1">Repo 1</a></li>
                    <li><a href="https://github.com/your-username/repo2">Repo 2</a></li>
            </ul>
        </div> -->
    </div>
    <footer class="footer">
        <p><i class="fas fa-map-marker-alt"></i> <strong>Location:</strong> Da Nang, Viet Nam</p>
    </footer>

</body>

</html>
